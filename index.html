<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsightFlow Analytics</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color:white;
}

nav{
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
}

.logo{
    color:#38bdf8;
    font-weight:bold;
    font-size:20px;
}

.hero{
    text-align:center;
    padding:120px 20px;
}

h1{
    font-size:52px;
}

p{
    color:#cbd5e1;
    max-width:600px;
    margin:0 auto 30px;
}

button{
    padding:14px 24px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.signup{
    background:#38bdf8;
}

.demo{
    background:transparent;
    border:2px solid #38bdf8;
    color:#38bdf8;
}

.features{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:50px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:12px;
    width:220px;
    text-align:center;
}
</style>
</head>

<body>

<nav>
    <div class="logo">InsightFlow</div>
</nav>

<section class="hero">

<h1>Turn Customer Data Into Growth</h1>

<p>
Understand user behavior, improve conversions,
and optimize your product with InsightFlow.
</p>

<a href="signup.html">
    <button class="signup" id="signupBtn">Sign Up</button>
</a>

<a href="demo.html">
    <button class="demo" id="demoBtn">Request Demo</button>
</a>

</section>

<section class="features">

<div class="card">
<h3>Real-Time</h3>
<p>Live tracking of user behavior</p>
</div>

<div class="card">
<h3>Funnels</h3>
<p>Understand drop-off points</p>
</div>

<div class="card">
<h3>Cohorts</h3>
<p>Segment users by behavior</p>
</div>

</section>

<script src="https://cdn.amplitude.com/libs/analytics-browser-2.x.x-min.js.gz"></script>

<script>
window.amplitude.init("7c9d3da9f680dc6a5f6de702648f1238");

amplitude.track("landing_page_viewed");

document.getElementById("signupBtn").addEventListener("click", function(){
    amplitude.track("signup_clicked", {
        page: "landing"
    });
});

document.getElementById("demoBtn").addEventListener("click", function(){
    amplitude.track("demo_clicked", {
        page: "landing"
    });
});
</script>

</body>
</html>
