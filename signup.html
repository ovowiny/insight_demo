<!DOCTYPE html>
<html>
<head>
<title>Sign Up - InsightFlow</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:80px;
}

input{
    display:block;
    margin:10px auto;
    padding:12px;
    width:260px;
    border-radius:6px;
    border:none;
}

button{
    padding:12px 20px;
    background:#38bdf8;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Create Account</h1>

<input placeholder="Full Name" />
<input placeholder="Email" />
<input placeholder="Company" />

<button onclick="submitSignup()">Create Account</button>

<script src="https://cdn.amplitude.com/libs/analytics-browser-2.11.1-min.js.gz"></script>

<script>
window.amplitude.init("7c9d3da9f680dc6a5f6de702648f1238", {
  defaultTracking: true
});

amplitude.track("signup_page_viewed");

function submitSignup(){

    amplitude.track("signup_form_submitted", {
        form: "signup"
    });

    alert("Signup Submitted (Demo)");
}
</script>

</body>
</html>
